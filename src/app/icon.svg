<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <title>Favicon</title>
  <defs>
    <clipPath id="disc">
      <circle cx="16" cy="16" r="16" />
    </clipPath>
    <linearGradient
      id="rim-shine"
      x1="6"
      y1="5"
      x2="28"
      y2="27"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#f0fff6" stop-opacity="0.98" />
      <stop offset="16%" stop-color="#8be8b0" stop-opacity="0.8" />
      <stop offset="36%" stop-color="#3d6a50" stop-opacity="0.4" />
      <stop offset="55%" stop-color="#172922" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#030604" stop-opacity="0.92" />
    </linearGradient>
    <radialGradient
      id="edge-glint"
      cx="12"
      cy="10"
      r="16"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="40%" stop-color="#c5f0d8" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#172922" stop-opacity="0" />
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="16" fill="#172922" />
  <g clip-path="url(#disc)">
    <circle cx="16" cy="16" r="16" fill="url(#edge-glint)" />
  </g>
  <circle
    cx="16"
    cy="16"
    r="15.35"
    fill="none"
    stroke="url(#rim-shine)"
    stroke-width="1.35"
  />
</svg>
